<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">PatentAgent logo</title>
  <desc id="desc">A liquid glass shield containing a patent document and claim graph.</desc>
  <defs>
    <linearGradient id="shield" x1="18" y1="8" x2="112" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FFFF"/>
      <stop offset="0.48" stop-color="#8CCAC7"/>
      <stop offset="1" stop-color="#165B5D"/>
    </linearGradient>
    <linearGradient id="paper" x1="43" y1="28" x2="89" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF4F2"/>
    </linearGradient>
    <linearGradient id="gold" x1="79" y1="30" x2="103" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE8A0"/>
      <stop offset="1" stop-color="#D9A441"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0A2D30" flood-opacity="0.22"/>
    </filter>
