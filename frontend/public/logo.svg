  <rect x="8" y="8" width="112" height="112" rx="30" fill="url(#shield)" filter="url(#softShadow)"/>
  <rect x="10" y="9" width="108" height="54" rx="28" fill="#FFFFFF" opacity="0.32"/>
  <path d="M64 22c17 0 31 7 43 15v30c0 25-15 41-43 51-28-10-43-26-43-51V37c12-8 26-15 43-15Z" fill="#103D40" opacity="0.18"/>
