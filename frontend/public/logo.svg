  <path d="M74 31v20h20" fill="url(#gold)"/>
  <path d="M51 61h30M51 72h27M51 83h20" stroke="#165B5D" stroke-width="5" stroke-linecap="round"/>
  <circle cx="36" cy="45" r="6" fill="#FFE8A0"/>
  <circle cx="94" cy="81" r="6" fill="#FFE8A0"/>
  <circle cx="74" cy="103" r="5" fill="#F8FFFF"/>
  <path d="M40 49l17 12M83 86l-9 15M81 72l11 7" stroke="#F8FFFF" stroke-width="4" stroke-linecap="round" opacity="0.92"/>
