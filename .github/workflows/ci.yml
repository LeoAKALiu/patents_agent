name: CI

"on":
  pull_request:
  push:
    branches:
      - main
      - release/v1.0.0
      - release/v1.1.0

permissions:
  contents: read

jobs:
  backend:
    name: Backend pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run backend tests
        run: python -m pytest -q
      - name: Run v1.1 deterministic quality gate
        run: python scripts/v1_api_smoke.py --report-dir .artifacts/v1.1.0-quality
      - name: Run golden patent deterministic release gate
        run: python scripts/golden_quality_gate.py --strict --report-path .artifacts/golden-quality-gate.json

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run Vitest
        run: npm test -- --run
      - name: Build frontend
        run: npm run build

  tauri:
    name: Tauri cargo check and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend for Tauri context
        working-directory: frontend
        run: npm run build
      - name: Stage backend sidecar placeholder for cargo check
        # tauri::generate_context! resolves bundle.resources at compile time.
        # The real PyInstaller sidecar (build/backend/patentagent-backend) is
        # only produced by the Tauri beforeBuildCommand, which does not run for
        # `cargo check`/`cargo test`. Stage a stub so the resource path resolves;
        # this job never executes the backend, so a placeholder is sufficient.
        run: |
          mkdir -p build/backend/patentagent-backend
          printf '#!/bin/sh\nexit 0\n' > build/backend/patentagent-backend/patentagent-backend
          chmod +x build/backend/patentagent-backend/patentagent-backend
      - name: Show Rust toolchain
        run: |
          rustc --version
          cargo --version
      - name: Run Tauri cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
      - name: Run Tauri cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
